# ─────────────────────────────────────────────────────────────────────────
# GitHub Action — Mise à jour automatique de l'agenda seniors
#
# PLACEMENT : copiez ce fichier dans le dépôt de publication (ex. "sereni-agenda")
#             à l'emplacement :  .github/workflows/update-agenda.yml
# Le dépôt doit aussi contenir le script  nice_agenda_to_json.py  (à sa racine)
# et avoir GitHub Pages activé (Settings → Pages → main / root).
#
# DEUX MODES :
#  1) Manuel (recommandé) : onglet "Actions" → "Run workflow" → coller l'URL
#     du PDF du mois. C'est le plus fiable car l'URL du PDF change chaque mois.
#  2) Programmé (best-effort) : le 1er de chaque mois, utilise la variable de
#     dépôt NICE_PDF_URL si elle est définie (Settings → Secrets and variables
#     → Actions → Variables → NICE_PDF_URL). Sinon, le run est ignoré.
# ─────────────────────────────────────────────────────────────────────────

name: Mise à jour agenda seniors

on:
  workflow_dispatch:
    inputs:
      pdf_url:
        description: "URL du PDF du programme mensuel"
        required: true
      year:
        description: "Année (laisser vide = année courante)"
        required: false
        default: ""
  schedule:
    # Les 1er, 3 et 5 du mois à 06:00 UTC (≈ 8h en France l'été) : le PDF de Nice
    # n'est pas toujours en ligne pile le 1er → plusieurs tentatives, sans risque
    # de doublon grâce à la dédup et au contrôle du mois ci-dessous.
    - cron: "0 6 1,3,5 * *"

permissions:
  contents: write           # autorise le commit du JSON régénéré

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install pypdf

      - name: Déterminer l'URL du PDF
        id: src
        run: |
          PDF="${{ github.event.inputs.pdf_url }}"
          if [ -z "$PDF" ]; then PDF="${{ vars.NICE_PDF_URL }}"; fi
          if [ -z "$PDF" ]; then
            echo "Aucune URL de PDF fournie (input ou variable NICE_PDF_URL) — arrêt."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "pdf=$PDF" >> "$GITHUB_OUTPUT"
          fi

      - name: Générer le JSON
        id: gen
        if: steps.src.outputs.skip != 'true'
        run: |
          YEAR="${{ github.event.inputs.year }}"
          if [ -z "$YEAR" ]; then YEAR=$(date -u +%Y); fi
          python nice_agenda_to_json.py --pdf "${{ steps.src.outputs.pdf }}" --year "$YEAR" --out agenda-nice.json
          echo "----- aperçu -----"
          head -c 600 agenda-nice.json
          echo ""

          # Contrôle du mois. Run MANUEL → on publie toujours (confiance opérateur).
          # Run PROGRAMMÉ → on ne publie que si le mois du JSON = mois courant,
          # pour éviter de republier un ancien programme si le PDF n'a pas changé.
          JSON_MONTH=$(python -c "import json;print(json.load(open('agenda-nice.json')).get('month',''))")
          CUR_MONTH=$(date -u +%Y-%m)
          echo "Mois du JSON : $JSON_MONTH | mois courant : $CUR_MONTH | déclencheur : ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          elif [ "$JSON_MONTH" = "$CUR_MONTH" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "⏭  Run programmé + mois différent → publication ignorée (programme pas encore à jour)."
          fi

      - name: Publier (commit + push)
        if: steps.gen.outputs.publish == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agenda-nice.json
          if git diff --staged --quiet; then
            echo "Aucun changement."
          else
            git commit -m "Agenda automatique $(date -u +%Y-%m)"
            git push
          fi
